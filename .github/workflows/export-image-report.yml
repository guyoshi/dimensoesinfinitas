name: Exportar relatório final de imagens

on:
  push:
    branches:
      - chore/webp-images
    paths:
      - ".github/workflows/export-image-report.yml"
      - "docs/imagens/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-image-report.yml"
      - "docs/imagens/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch com o relatório final
        uses: actions/checkout@v4
        with:
          ref: chore/webp-images

      - name: Disponibilizar relatórios
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-imagens-webp-final
          path: |
            docs/imagens/relatorio-imagens-webp.md
            docs/imagens/relatorio-imagens-webp.csv
            docs/imagens/relatorio-imagens-webp.json
          if-no-files-found: error
          retention-days: 30
