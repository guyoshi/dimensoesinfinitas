name: Converter imagens para WebP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          ref: chore/webp-images
          fetch-depth: 0
          lfs: true

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Pillow
        run: python -m pip install --upgrade pillow

      - name: Converter, optimizar e catalogar imagens
        run: python tools/convert_images_to_webp.py

      - name: Guardar alterações na branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração para guardar."
          else
            git commit -m "Optimizar imagens do site em WebP [skip ci]"
            git push origin chore/webp-images
          fi

      - name: Disponibilizar relatórios para download
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-imagens-webp
          path: |
            docs/imagens/relatorio-imagens-webp.md
            docs/imagens/relatorio-imagens-webp.csv
            docs/imagens/relatorio-imagens-webp.json
          if-no-files-found: error
          retention-days: 30
